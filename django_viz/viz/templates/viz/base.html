<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}{{ title|default:"Ops Dashboard" }}{% endblock %} — Caso Rappi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --bg: #0f1419; --card: #1a2332; --accent: #ff3008; --muted: #8b9bb4; }
    body { background: linear-gradient(165deg, #0f1419 0%, #1a1f2e 100%); min-height: 100vh; color: #e8ecf4; }
    .navbar { background: rgba(15,20,25,.92) !important; border-bottom: 1px solid #2a3544; }
    .navbar-brand { color: var(--accent) !important; font-weight: 700; letter-spacing: -0.02em; }
    .nav-link { color: var(--muted) !important; }
    .nav-link:hover, .nav-link.active { color: #fff !important; }
    .card {
      background: var(--card);
      border: 1px solid #2a3544;
      border-radius: 12px;
      color: #d5dde8;
      --bs-card-color: #d5dde8;
      --bs-body-color: #d5dde8;
    }
    .card-header { border-bottom-color: #2a3544; color: #fff; font-weight: 600; background: rgba(0,0,0,.2) !important; }
    /* Bootstrap deja .card-body con color oscuro; forzamos contraste en tema oscuro */
    .card-body { color: #d5dde8 !important; }
    .card-body strong, .card-body .fw-bold { color: #f0f4fc !important; }
    .card-body li { margin-bottom: 0.35rem; }
    /* Tablas (pandas + Bootstrap): evitar filas claras con texto claro */
    .table, table.dataframe {
      --bs-table-bg: #1a2332;
      --bs-table-color: #e8ecf4;
      --bs-table-striped-bg: rgba(255, 255, 255, 0.06);
      --bs-table-striped-color: #e8ecf4;
      --bs-table-hover-bg: rgba(255, 48, 8, 0.12);
      --bs-table-hover-color: #fff;
      --bs-table-border-color: #2a3544;
      --bs-border-color: #2a3544;
      color: #e8ecf4 !important;
    }
    .table thead th, table.dataframe thead th {
      background: #121a26 !important;
      color: #fff !important;
      border-color: #2a3544 !important;
    }
    .table tbody td, .table tbody th, table.dataframe td, table.dataframe th {
      color: #e8ecf4 !important;
      border-color: #2a3544 !important;
    }
    .table-striped > tbody > tr:nth-of-type(odd) > * {
      box-shadow: inset 0 0 0 9999px rgba(255, 255, 255, 0.04) !important;
      color: #e8ecf4 !important;
    }
    .table-striped > tbody > tr:nth-of-type(even) > * {
      box-shadow: inset 0 0 0 9999px rgba(0, 0, 0, 0.2) !important;
      color: #e8ecf4 !important;
    }
    .text-muted { color: var(--muted) !important; }
    a { color: #7eb8ff; }
    pre.json { background: #0d1117; color: #c9d1d9; border-radius: 8px; padding: 1rem; font-size: 0.8rem; max-height: 420px; overflow: auto; border: 1px solid #2a3544; }
    code { color: #f0a8a0; background: rgba(0,0,0,.25); padding: 0.1em 0.35em; border-radius: 4px; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-lg mb-4">
    <div class="container">
      <a class="navbar-brand" href="{% url 'home' %}">Rappi · Ops data</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'pipeline' %}">Pipeline</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'monitor' %}">Monitor</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'datos' %}">Datos</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'calibracion' %}">Calibración</a></li>
          <li class="nav-item"><a class="nav-link" href="{% url 'figuras' %}">Figuras M1</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container pb-5">
    {% if messages %}
    <div class="mb-3">
      {% for message in messages %}
      <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
        <pre class="mb-0 small" style="white-space:pre-wrap;">{{ message }}</pre>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
      </div>
      {% endfor %}
    </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
