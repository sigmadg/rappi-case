# Caso técnico: app (Django + monitor + puente /tick) + Prometheus + Grafana.
# Uso: ./scripts/docker_stack.sh   o   docker compose up --build
# Si 8000/8090/9108 del host están ocupados:
#   CASO_HOST_HTTP=8001 CASO_HOST_BRIDGE=8091 CASO_HOST_METRICS=9109 docker compose up --build
# Requisitos: data/rappi_delivery_case_data.xlsx
# Opcional: cp .env.example .env y descomenta la línea .env abajo (Telegram / OpenAI).

services:
  caso-tecnico:
    build: .
    image: caso-tecnico:latest
    # Ollama en el host (Linux): el contenedor resuelve host.docker.internal → IP del host.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${CASO_HOST_HTTP:-8000}:8000"
      - "${CASO_HOST_BRIDGE:-8090}:8090"
      - "${CASO_HOST_METRICS:-9108}:9108"
    volumes:
      - ./data:/app/data:ro
      - ./.env:/app/.env:ro
    environment:
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,testserver}
      MONITOR_DRY_RUN: ${MONITOR_DRY_RUN:-1}
      MONITOR_INTERVAL_SEC: ${MONITOR_INTERVAL_SEC:-600}
      ENABLE_M2_ENGINE_LOOP: ${ENABLE_M2_ENGINE_LOOP:-1}
      M2_ENGINE_INTERVAL_SEC: ${M2_ENGINE_INTERVAL_SEC:-}
      ALERT_STATE_PATH_M2: ${ALERT_STATE_PATH_M2:-}
      # Al arrancar: RAW_DATA del Excel → modulo2_motor_alertas/calibration.json (statsmodels).
      ENABLE_RECALIBRATE_ON_START: ${ENABLE_RECALIBRATE_ON_START:-1}
      # Ollama en el host (no uses ${OLLAMA_BASE_URL} del .env local: suele ser 127.0.0.1). Sobrescribe con CASO_OLLAMA_URL.
      OLLAMA_BASE_URL: ${CASO_OLLAMA_URL:-http://host.docker.internal:11434}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-mixtral:8x7b-instruct-v0.1-q4_0}
      OLLAMA_TIMEOUT_SEC: ${OLLAMA_TIMEOUT_SEC:-180}

  prometheus:
    image: prom/prometheus:v2.53.0
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${CASO_HOST_PROMETHEUS:-9090}:9090"
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - caso-tecnico
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:9090/-/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 15s

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "${CASO_HOST_GRAFANA:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_DEFAULT_THEME: dark
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 45s
