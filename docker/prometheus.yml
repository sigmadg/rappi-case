global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: rappi_bridge
    metrics_path: /metrics
    scrape_timeout: 10s
    static_configs:
      - targets: ["caso-tecnico:8090"]
        labels:
          component: n8n_bridge

  - job_name: rappi_monitor
    metrics_path: /metrics
    scrape_timeout: 10s
    static_configs:
      - targets: ["caso-tecnico:9108"]
        labels:
          component: monitor_loop
